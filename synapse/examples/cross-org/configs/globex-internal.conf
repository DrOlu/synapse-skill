# globex-internal.conf — Globex Inc's internal NATS server
# Connects OUTBOUND to cloud hub as a leaf node

port: 4222
http_port: 8222
server_name: globex-internal

# JetStream for internal persistence
jetstream {
  store_dir: "/data/jetstream"
  max_mem: 512M
  max_file: 2G
}

# Connect OUTBOUND to cloud hub as leaf node
leafnodes {
  remotes: [
    {
      url: "nats://cloud-hub:7422"
      account: "GLOBEX_INC"
      # For production with TLS:
      # credentials: "/etc/nats/creds/leafnode.globex.creds"
      # tls {
      #   ca_file: "/etc/nats/tls/ca.crt"
      # }
    }
  ]
}

# Internal accounts
accounts {
  GLOBEX_INC: {
    jetstream: enabled
  }
}

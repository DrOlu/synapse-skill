# cloud-hub.conf — Central NATS server at the neutral cloud hub
# Accepts leaf node connections from both Acme and Globex

port: 4222
http_port: 8222
server_name: cloud-hub

# Leaf node listener (outbound connections from Acme/Globex)
leafnodes {
  port: 7422
  tls {
    # For production, use real TLS certs:
    # cert_file: "/etc/nats/tls/hub.crt"
    # key_file: "/etc/nats/tls/hub.key"
    # ca_file: "/etc/nats/tls/ca.crt"
    # timeout: 3
  }
}

# Account isolation — Acme and Globex each get their own account
accounts {
  ACME_CORP: {
    jetstream: enabled

    exports: [
      { stream: "mesh.event.shared.acme.>" }
      { service: "mesh.agent.acme.>" }
    ]

    imports: [
      { stream: { account: GLOBEX_INC, subject: "mesh.event.shared.globex.>" }, to: "mesh.event.shared.globex.>" }
      { service: { account: GLOBEX_INC, subject: "mesh.agent.globex.>" }, to: "mesh.agent.globex.>" }
    ]
  }

  GLOBEX_INC: {
    jetstream: enabled

    exports: [
      { stream: "mesh.event.shared.globex.>" }
      { service: "mesh.agent.globex.>" }
    ]

    imports: [
      { stream: { account: ACME_CORP, subject: "mesh.event.shared.acme.>" }, to: "mesh.event.shared.acme.>" }
      { service: { account: ACME_CORP, subject: "mesh.agent.acme.>" }, to: "mesh.agent.acme.>" }
    ]
  }
}

# System account for monitoring
system_account: SYS

version: "3.8"

services:
  nats:
    image: nats:2.11-alpine
    container_name: nats-server
    ports:
      - "4222:4222"
      - "8222:8222"
      - "8443:8443"
    volumes:
      - ./nats.conf:/etc/nats/nats.conf
      - nats-data:/data
    command: ["-c", "/etc/nats/nats.conf"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  bob-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bob-agent
    depends_on:
      nats:
        condition: service_healthy
    environment:
      NATS_URL: nats://nats:4222
      AGENT_NAME: bob-agent
    command: ["node", "--experimental-specifier-resolution=node", "dist/bob-agent.js"]
    restart: unless-stopped

  jeff-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jeff-agent
    depends_on:
      nats:
        condition: service_healthy
    environment:
      NATS_URL: nats://nats:4222
      AGENT_NAME: jeff-agent
    command: ["node", "--experimental-specifier-resolution=node", "dist/jeff-agent.js"]
    restart: unless-stopped

volumes:
  nats-data:

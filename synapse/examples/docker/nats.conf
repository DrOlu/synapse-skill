# NATS server configuration for Synapse Docker example

port: 4222
http_port: 8222

# WebSocket support (for browser agents)
websocket {
  port: 8443
  no_tls: true
}

# JetStream persistence
jetstream {
  store_dir: "/data/jetstream"
  max_mem: 512M
  max_file: 2G
}

# Monitoring
server_name: synapse-docker
